<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>ArduinoPanel</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg     : #080a0c;
  --bg1    : #0f1215;
  --bg2    : #161b20;
  --bg3    : #1c2228;
  --line   : #232b33;
  --muted  : #3d4a58;
  --dim    : #6b7d8f;
  --text   : #c8d4e0;
  --white  : #eef2f7;
  --accent : #4fc3f7;
  --green  : #4caf94;
  --amber  : #e6a817;
  --red    : #e05555;
  --led1   : #ff3b3b;
  --led2   : #ffc107;
  --led3   : #4caf50;
  --led4   : #2196f3;
  --led5   : #e0e0e0;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'DM Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
body::after {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 999;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
}
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(8,10,12,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--line);
  padding: 14px 18px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800; font-size: 17px;
  color: var(--white); letter-spacing: -0.02em;
}
.logo em { color: var(--accent); font-style: normal; }
.conn-row { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--dim); }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background .4s, box-shadow .4s; }
.dot.on  { background: var(--green); box-shadow: 0 0 8px var(--green); }
.dot.off { background: var(--red); }
main { max-width: 460px; margin: 0 auto; padding: 18px 14px 90px; }
.sec {
  font-size: 9px; letter-spacing: .15em; text-transform: uppercase;
  color: var(--muted); margin: 24px 0 10px; padding-left: 2px;
}
.esp-card {
  background: var(--bg2); border: 1px solid var(--line);
  border-radius: 14px; padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.esp-left strong { font-family: 'Syne', sans-serif; font-size: 15px; color: var(--white); }
.esp-left small  { font-size: 11px; color: var(--dim); margin-top: 3px; display: block; }
.esp-badge {
  font-size: 9px; letter-spacing: .1em; font-weight: 500;
  padding: 4px 10px; border-radius: 6px;
}
.badge-sim  { background: rgba(230,168,23,.1); color: var(--amber); border: 1px solid rgba(230,168,23,.2); }
.badge-live { background: rgba(76,175,148,.1); color: var(--green); border: 1px solid rgba(76,175,148,.2); }
.badge-off  { background: rgba(224,85,85,.1);  color: var(--red);   border: 1px solid rgba(224,85,85,.2); }
.sensor-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.s-card {
  background: var(--bg2); border: 1px solid var(--line); border-radius: 14px;
  padding: 14px; position: relative; overflow: hidden;
}
.s-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: .4;
}
.s-val  { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; color: var(--accent); line-height: 1; }
.s-unit { font-size: 10px; color: var(--muted); margin-top: 4px; }
.s-lbl  { font-size: 10px; color: var(--dim); margin-top: 8px; }
.led-list { display: flex; flex-direction: column; gap: 8px; }
.led-row {
  background: var(--bg2); border: 1px solid var(--line); border-radius: 14px;
  padding: 14px 16px; display: flex; align-items: center; gap: 14px;
  cursor: pointer; transition: border-color .2s, background .2s, transform .1s;
  user-select: none; -webkit-user-select: none;
}
.led-row:active { transform: scale(0.98); }
.led-row.active { border-color: var(--led-color); background: rgba(255,255,255,0.02); }
.led-bulb {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--bg3); border: 2px solid var(--line);
  flex-shrink: 0; transition: background .25s, box-shadow .25s, border-color .25s;
}
.led-row.active .led-bulb {
  background: var(--led-color);
  border-color: var(--led-color);
  box-shadow: 0 0 14px var(--led-color), 0 0 30px color-mix(in srgb, var(--led-color) 30%, transparent);
}
.led-info { flex: 1; }
.led-name  { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; color: var(--white); }
.led-state { font-size: 10px; color: var(--muted); margin-top: 2px; }
.led-row.active .led-state { color: var(--led-color); }
.toggle {
  width: 40px; height: 22px; border-radius: 11px;
  background: var(--bg3); border: 1px solid var(--line);
  position: relative; flex-shrink: 0; transition: background .25s, border-color .25s;
}
.toggle::after {
  content: ''; position: absolute;
  top: 3px; left: 3px; width: 14px; height: 14px;
  border-radius: 50%; background: var(--muted);
  transition: transform .25s, background .25s;
}
.led-row.active .toggle { border-color: var(--led-color); background: color-mix(in srgb, var(--led-color) 20%, transparent); }
.led-row.active .toggle::after { transform: translateX(18px); background: var(--led-color); }
.btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.btn {
  padding: 14px; border: 1px solid var(--line); border-radius: 12px;
  background: var(--bg2); color: var(--text);
  font-family: 'DM Mono', monospace; font-size: 12px;
  cursor: pointer; transition: background .2s, border-color .2s, transform .1s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn:active { transform: scale(0.97); }
.btn-on  { border-color: rgba(76,175,148,.3); color: var(--green); }
.btn-on:active  { background: rgba(76,175,148,.08); }
.btn-off { border-color: rgba(224,85,85,.3); color: var(--red); }
.btn-off:active { background: rgba(224,85,85,.08); }
.cmd-wrap {
  background: var(--bg2); border: 1px solid var(--line); border-radius: 14px;
  padding: 4px 4px 4px 16px; display: flex; align-items: center; gap: 8px;
  transition: border-color .2s;
}
.cmd-wrap:focus-within { border-color: var(--accent); }
.cmd-input {
  flex: 1; background: none; border: none; outline: none;
  font-family: 'DM Mono', monospace; font-size: 13px;
  color: var(--white); padding: 12px 0; caret-color: var(--accent);
}
.cmd-input::placeholder { color: var(--muted); }
.cmd-btn {
  background: var(--accent); color: var(--bg); border: none;
  border-radius: 10px; padding: 11px 16px;
  font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
  letter-spacing: .06em; cursor: pointer; transition: opacity .2s, transform .1s;
}
.cmd-btn:active { transform: scale(0.96); opacity: .85; }
.log-box {
  background: var(--bg1); border: 1px solid var(--line); border-radius: 14px;
  height: 170px; overflow-y: auto; padding: 12px;
  font-size: 11px; line-height: 1.9;
  scrollbar-width: thin; scrollbar-color: var(--line) transparent;
}
.le { display: flex; gap: 10px; }
.lt { color: var(--muted); flex-shrink: 0; }
.lm { color: var(--dim); word-break: break-all; }
.lm.ok   { color: var(--green); }
.lm.err  { color: var(--red); }
.lm.info { color: var(--accent); }
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes pop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
.pop { animation: pop .2s ease; }
main > * { animation: fadeUp .3s ease both; }
main > *:nth-child(2)  { animation-delay: .04s; }
main > *:nth-child(3)  { animation-delay: .08s; }
main > *:nth-child(4)  { animation-delay: .12s; }
main > *:nth-child(5)  { animation-delay: .16s; }
main > *:nth-child(6)  { animation-delay: .20s; }
main > *:nth-child(7)  { animation-delay: .24s; }
main > *:nth-child(8)  { animation-delay: .28s; }
</style>
</head>
<body>
<header>
  <div class="logo">Arduino<em>Panel</em></div>
  <div class="conn-row">
    <div class="dot" id="dot"></div>
    <span id="conn-txt">Menghubungkan</span>
  </div>
</header>
<main>
  <p class="sec">Status perangkat</p>
  <div class="esp-card">
    <div class="esp-left">
      <strong>NodeMCU ESP8266</strong>
      <small id="esp-sub">Mengecek koneksi...</small>
    </div>
    <span class="esp-badge badge-sim" id="esp-badge">SIMULASI</span>
  </div>
  <p class="sec">Data sensor A0</p>
  <div class="sensor-row">
    <div class="s-card">
      <div class="s-val" id="s-volt">—</div>
      <div class="s-unit">Volt</div>
      <div class="s-lbl">Tegangan A0</div>
    </div>
    <div class="s-card">
      <div class="s-val" id="s-raw">—</div>
      <div class="s-unit">0 – 1023</div>
      <div class="s-lbl">Nilai ADC</div>
    </div>
  </div>
  <p class="sec">Kontrol 5 LED</p>
  <div class="led-list" id="led-list"></div>
  <p class="sec">Kontrol semua</p>
  <div class="btn-row">
    <button class="btn btn-on"  onclick="sendCmd('ALL_ON')">▶ Semua ON</button>
    <button class="btn btn-off" onclick="sendCmd('ALL_OFF')">■ Semua OFF</button>
  </div>
  <p class="sec">Perintah custom</p>
  <div class="cmd-wrap">
    <input class="cmd-input" id="cmd-in" placeholder="Contoh: LED2_ON"
           onkeydown="if(event.key==='Enter')sendCustom()"/>
    <button class="cmd-btn" onclick="sendCustom()">KIRIM</button>
  </div>
  <p class="sec">Log aktivitas</p>
  <div class="log-box" id="log"></div>
</main>
<script src="/socket.io/socket.io.js"></script>
<script>
const LED_CONFIG = [
  { name:'Merah',  color:'#ff3b3b', pin:'D1' },
  { name:'Kuning', color:'#ffc107', pin:'D2' },
  { name:'Hijau',  color:'#4caf50', pin:'D5' },
  { name:'Biru',   color:'#2196f3', pin:'D6' },
  { name:'Putih',  color:'#e0e0e0', pin:'D7' },
];
let leds = [false,false,false,false,false];
const list = document.getElementById('led-list');
LED_CONFIG.forEach((cfg, i) => {
  const row = document.createElement('div');
  row.className = 'led-row';
  row.id = 'led-row-' + i;
  row.style.setProperty('--led-color', cfg.color);
  row.innerHTML = `
    <div class="led-bulb" id="bulb-${i}"></div>
    <div class="led-info">
      <div class="led-name">${cfg.name}</div>
      <div class="led-state" id="st-${i}">OFF · Pin ${cfg.pin}</div>
    </div>
    <div class="toggle"></div>
  `;
  row.onclick = () => toggleLed(i);
  list.appendChild(row);
});
const socket = io();
socket.on('connect', () => {
  setConn(true);
  addLog('Terhubung ke server', 'ok');
});
socket.on('disconnect', () => {
  setConn(false);
  addLog('Koneksi terputus', 'err');
});
socket.on('state-update', (s) => {
  if (s.leds)   updateLeds(s.leds);
  if (s.sensor) updateSensor(s.sensor);
});
socket.on('sensor-data',  (d) => updateSensor(d));
socket.on('esp-reply',    (m) => addLog('← ' + m, 'ok'));
socket.on('log',          (e) => addLog(e.msg, e.type));
socket.on('log-history',  (arr) => arr.forEach(e => addLog(e.msg, e.type)));
socket.on('esp-status',   (d) => updateEspBadge(d.online ? 'live' : 'off'));
async function checkStatus() {
  try {
    const r = await fetch('/api/status');
    const d = await r.json();
    if (d.simMode) {
      updateEspBadge('sim');
      document.getElementById('esp-sub').textContent = 'Mode simulasi — ESP8266 belum tersambung';
    } else {
      updateEspBadge(d.espOnline ? 'live' : 'off');
      document.getElementById('esp-sub').textContent = d.espOnline ? 'Online · polling aktif' : 'Offline — belum ada koneksi';
    }
    if (d.leds)   updateLeds(d.leds);
    if (d.sensor) updateSensor(d.sensor);
  } catch {}
}
checkStatus();
setInterval(checkStatus, 6000);
function setConn(on) {
  document.getElementById('dot').className = 'dot ' + (on ? 'on' : 'off');
  document.getElementById('conn-txt').textContent = on ? 'Terhubung' : 'Terputus';
}
function updateEspBadge(type) {
  const el = document.getElementById('esp-badge');
  const map = { sim: ['SIMULASI','badge-sim'], live: ['ONLINE','badge-live'], off: ['OFFLINE','badge-off'] };
  const [label, cls] = map[type] || map.off;
  el.textContent = label;
  el.className = 'esp-badge ' + cls;
}
function updateSensor(d) {
  const setVal = (id, v) => {
    const el = document.getElementById(id);
    if (el && el.textContent !== String(v)) {
      el.textContent = v;
      el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
    }
  };
  setVal('s-volt', d.voltage !== undefined ? d.voltage : '—');
  setVal('s-raw',  d.raw     !== undefined ? d.raw     : '—');
}
function updateLeds(arr) {
  arr.forEach((on, i) => {
    leds[i] = on;
    const row = document.getElementById('led-row-' + i);
    const st  = document.getElementById('st-' + i);
    if (!row) return;
    row.classList.toggle('active', on);
    st.textContent = (on ? 'ON' : 'OFF') + ' · Pin ' + LED_CONFIG[i].pin;
  });
}
function toggleLed(i) {
  const next = !leds[i];
  leds[i] = next;
  const row = document.getElementById('led-row-' + i);
  const st  = document.getElementById('st-' + i);
  if (row) row.classList.toggle('active', next);
  if (st)  st.textContent = (next ? 'ON' : 'OFF') + ' · Pin ' + LED_CONFIG[i].pin;
  sendCmd('LED' + (i+1) + '_' + (next ? 'ON' : 'OFF'));
}
function sendCmd(cmd) {
  addLog('→ ' + cmd, 'info');
  socket.emit('send-command', cmd);
}
function sendCustom() {
  const inp = document.getElementById('cmd-in');
  const val = inp.value.trim().toUpperCase();
  if (val) { sendCmd(val); inp.value = ''; }
}
function addLog(msg, type) {
  const box = document.getElementById('log');
  const now = new Date().toLocaleTimeString('id-ID');
  const row = document.createElement('div');
  row.className = 'le';
  row.innerHTML = '<span class="lt">' + now + '</span><span class="lm ' + (type||'') + '">' + msg + '</span>';
  box.insertBefore(row, box.firstChild);
  while (box.children.length > 80) box.removeChild(box.lastChild);
}
</script>
</body>
</html>
